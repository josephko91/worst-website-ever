<!DOCTYPE html>
<html>

<head>
    <title>The Worst Website Ever</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>WELCOME</h1>
<p>This website technically works.</p>

<button id="startButton" type="button">Start Experience</button>

<div id="uselessForm">

<h2>Please Fill Out This Important Form</h2>

<p>Use your mouse wheel to scroll through letters A–Z, click the input to insert the selected letter, right-click to delete the last letter.</p>

<div class="name-row">
    <input class="name-input" placeholder="First name" readonly>
    <select class="picker" aria-label="First name letter picker"></select>
</div>
<div class="name-row">
    <input class="name-input" placeholder="Middle name" readonly>
    <select class="picker" aria-label="Middle name letter picker"></select>
</div>
<div class="name-row">
    <input class="name-input" placeholder="Last name" readonly>
    <select class="picker" aria-label="Last name letter picker"></select>
</div>

<br><br>

<button id="submitButton" type="button">Submit</button>

</div>

<div id="message"></div>

<script src="scripts.js"></script>

</body>
</html>
